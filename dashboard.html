<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>IEDEP</h2>
    <ul>
      <li onclick="loadRoot()">📁 Documentos</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <span id="userName"></span>
      <button onclick="logout()">Salir</button>
    </div>

    <!-- Actions -->
    <div class="actions">
      <input type="text" id="folderName" placeholder="Nueva carpeta">
      <button onclick="crearCarpeta()">Crear</button>

      <input type="file" id="fileInput">
      <button onclick="subirArchivo()">Subir</button>
    </div>

    <!-- Notificación -->
    <div id="msg" class="msg"></div>

    <!-- Explorador -->
    <div id="explorer" class="explorer"></div>

  </div>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
