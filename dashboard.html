<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body>

<h1>Bienvenido</h1>

<p id="user"></p>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "index.html";
}

document.getElementById("user").innerText =
  "Usuario: " + user.nombre + " | Rol: " + user.rol;
</script>

</body>
</html>
