<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">IEDEP</div>

    <div class="menu">
      <div class="menu-item active" onclick="loadRoot()">
        📁 <span>Documentos</span>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="title">Repositorio Documental</div>

      <div class="user-box">
        <span id="userName"></span>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>

    <!-- ACCIONES -->
    <div class="actions">

      <div class="card">
        <h3>📁 Crear Carpeta</h3>
        <div class="row">
          <input type="text" id="folderName" placeholder="Nombre de carpeta">
          <button class="btn primary" onclick="crearCarpeta()">Crear</button>
        </div>
      </div>

      <div class="card">
        <h3>📤 Subir Archivo</h3>
        <div class="row">
          <input type="file" id="fileInput">
          <button class="btn success" onclick="subirArchivo()">Subir</button>
        </div>
      </div>

    </div>

    <!-- MENSAJE -->
    <div id="msg" class="msg"></div>
<h3 style="margin-left:30px;">Documentos</h3>
    <!-- EXPLORADOR -->
    <div id="explorer" class="explorer"></div>

  </div>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
