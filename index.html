<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - IEDEP</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

  <!-- LADO IZQUIERDO -->
  <div class="left">
    <div class="left-content">
      <h1>IEDEP</h1>
      <p>Repositorio Documental del Sistema de Procedimientos</p>
    </div>
  </div>

  <!-- LADO DERECHO -->
  <div class="right">
    <div class="login-box">

      <h2>Login</h2>

      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="pin" placeholder="PIN">

      <button onclick="login()">Ingresar</button>

      <p id="error" class="error"></p>

    </div>
  </div>

</div>

<script src="js/login.js"></script>
</body>
</html>
